<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Stats</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="totalAnswered === 0" class="ion-text-center ion-padding">
    <p>No stats yet. Go to Home to start playing!</p>
  </div>

  <div *ngIf="totalAnswered > 0">
    <ion-card>
      <ion-card-header>
        <ion-card-title>Overall Performance</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-grid>
          <ion-row>
            <ion-col class="ion-text-center">
              <h2>{{ totalAnswered }}</h2>
              <p>Played</p>
            </ion-col>
            <ion-col class="ion-text-center">
              <h2>{{ totalCorrect }}</h2>
              <p>Correct</p>
            </ion-col>
            <ion-col class="ion-text-center">
              <h2>{{ totalWrong }}</h2>
              <p>Wrong</p>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Accuracy</ion-card-title>
      </ion-card-header>
      <ion-card-content class="ion-text-center">
        <h1>{{ accuracy }}%</h1>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Streaks</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-grid>
          <ion-row>
            <ion-col class="ion-text-center">
              <h2>{{ currentStreak }}</h2>
              <p>Current Streak</p>
            </ion-col>
            <ion-col class="ion-text-center">
              <h2>{{ bestStreak }}</h2>
              <p>Best Streak</p>
            </ion-col>
          </ion-row>
        </ion-grid>
      </ion-card-content>
    </ion-card>
  </div>

</ion-content>
